# =============================================================================
# 架构本体 - 架构模式与规则清单
# =============================================================================
# level 说明:
#   required   - 必须遵循，不可违反
#   preferred  - 推荐遵循，特殊场景可协商
#   optional   - 可选，视项目规模和复杂度决定
# =============================================================================

# ─────────────────────────────────────────────
# 分层架构
# ─────────────────────────────────────────────
layering:
  model: "三层架构"
  layers:
    - name: Controller / Router
      level: required
      responsibility: "接收请求、参数校验、调用 Service、返回响应"
      forbidden:
        - "直接操作数据库"
        - "编写业务逻辑"
        - "直接调用第三方服务"
      note: "Controller 只做请求的入口和出口，保持薄层"

    - name: Service
      level: required
      responsibility: "业务逻辑编排、事务管理、领域规则执行"
      rules:
        - "所有业务逻辑必须在 Service 层实现"
        - "Service 之间可以互相调用，但避免循环依赖"
        - "Service 不应直接依赖 HTTP 请求/响应对象"
      note: "Service 是业务的核心，应可独立于 Web 框架测试"

    - name: Repository / DAO
      level: required
      responsibility: "数据持久化、数据库查询、ORM 操作"
      rules:
        - "所有数据库操作必须通过 Repository 层"
        - "Repository 只负责数据存取，不包含业务逻辑"
        - "返回领域对象或数据字典，不返回 ORM 内部对象"
      note: "隔离数据访问细节，方便切换数据源"

  cross_cutting:
    - name: Middleware / 中间件
      level: preferred
      responsibility: "认证、日志、限流、CORS 等横切关注点"
      note: "通用逻辑放中间件，不要散落在各 Controller 中"

    - name: Utils / Helpers
      level: preferred
      responsibility: "通用工具函数，无业务语义"
      rules:
        - "工具函数必须是无状态的纯函数"
        - "不允许依赖业务层组件"

# ─────────────────────────────────────────────
# 配置管理
# ─────────────────────────────────────────────
configuration:
  principle: "配置与代码分离"
  level: required
  rules:
    - rule: "禁止在代码中硬编码配置值"
      level: required
      examples:
        bad: "db_host = '192.168.1.100'"
        good: "db_host = config.get('database.host')"

    - rule: "使用配置文件管理环境差异"
      level: required
      format: "YAML 优先，JSON 可接受"
      structure: "按环境分文件：config.yaml（默认）、dev.yaml、staging.yaml、prod.yaml"

    - rule: "敏感信息通过环境变量注入"
      level: required
      examples:
        - "数据库密码"
        - "API 密钥"
        - "JWT 密钥"
      note: "敏感信息不得出现在配置文件或代码仓库中"

    - rule: "配置项必须有默认值或明确的错误提示"
      level: preferred
      note: "缺少必要配置时应 fail fast，给出清晰的错误信息"

# ─────────────────────────────────────────────
# 设计模式
# ─────────────────────────────────────────────
design_patterns:
  preferred:
    - name: "依赖注入 (DI)"
      scene: "组件之间的依赖管理"
      level: preferred
      note: "通过构造函数或参数注入依赖，便于测试和替换"

    - name: "工厂模式"
      scene: "需要根据条件创建不同实例"
      level: preferred
      note: "避免在业务代码中直接 new 复杂对象"

    - name: "策略模式"
      scene: "同一行为有多种实现方式"
      level: preferred
      note: "用策略替代大量 if-else 分支"

    - name: "装饰器模式"
      scene: "为已有功能添加横切逻辑（日志、缓存、重试）"
      level: preferred
      note: "Python 项目优先使用装饰器语法"

    - name: "Repository 模式"
      scene: "数据访问层抽象"
      level: required
      note: "配合三层架构使用，隔离数据库实现细节"

  discouraged:
    - name: "God Object / 上帝类"
      reason: "单个类承担过多职责，难以维护和测试"

    - name: "Service Locator"
      reason: "隐藏依赖关系，优先使用依赖注入"

    - name: "硬编码单例"
      reason: "全局状态难以测试，优先使用 DI 容器管理生命周期"

# ─────────────────────────────────────────────
# 目录结构
# ─────────────────────────────────────────────
project_structure:
  principle: "按功能域组织，而非按技术类型"
  level: preferred

  backend_template:
    description: "后端项目推荐目录结构"
    structure: |
      project/
      ├── app/
      │   ├── __init__.py          # 应用工厂
      │   ├── config/              # 配置文件
      │   │   ├── config.yaml
      │   │   ├── dev.yaml
      │   │   └── prod.yaml
      │   ├── controllers/         # Controller 层（路由 + 参数校验）
      │   │   └── user_controller.py
      │   ├── services/            # Service 层（业务逻辑）
      │   │   └── user_service.py
      │   ├── repositories/        # Repository 层（数据访问）
      │   │   └── user_repository.py
      │   ├── models/              # 数据模型 / ORM 模型
      │   │   └── user.py
      │   ├── schemas/             # 请求/响应数据校验（Pydantic / Marshmallow）
      │   │   └── user_schema.py
      │   ├── middleware/          # 中间件
      │   ├── utils/               # 通用工具
      │   └── exceptions/          # 自定义异常
      ├── tests/                   # 测试目录
      ├── migrations/              # 数据库迁移
      ├── requirements.txt
      └── run.py

  frontend_template:
    description: "前端项目推荐目录结构"
    structure: |
      src/
      ├── components/              # 通用 UI 组件
      │   └── Button/
      │       ├── index.tsx
      │       ├── Button.test.tsx
      │       └── Button.module.css
      ├── pages/                   # 页面组件
      ├── services/                # API 调用封装
      ├── stores/                  # 状态管理
      ├── hooks/                   # 自定义 hooks
      ├── utils/                   # 通用工具
      ├── types/                   # TypeScript 类型定义
      └── config/                  # 配置

# ─────────────────────────────────────────────
# 错误处理
# ─────────────────────────────────────────────
error_handling:
  rules:
    - rule: "使用自定义异常类表达业务错误"
      level: preferred
      note: "如 UserNotFoundException、InvalidPasswordException"

    - rule: "Controller 层统一捕获异常并转换为 HTTP 响应"
      level: required
      note: "使用全局异常处理器，不在每个接口里 try-catch"

    - rule: "Service 层抛出业务异常，不处理 HTTP 相关逻辑"
      level: required

    - rule: "Repository 层将数据库异常转换为业务异常"
      level: preferred

    - rule: "所有异常必须记录日志，包含上下文信息"
      level: required

# ─────────────────────────────────────────────
# API 设计
# ─────────────────────────────────────────────
api_design:
  style: "RESTful"
  level: preferred
  rules:
    - rule: "URL 使用名词复数形式"
      level: preferred
      examples:
        good: "/api/users, /api/orders"
        bad: "/api/getUser, /api/createOrder"

    - rule: "使用 HTTP 方法表达操作语义"
      level: required
      mapping:
        GET: "查询"
        POST: "创建"
        PUT: "全量更新"
        PATCH: "部分更新"
        DELETE: "删除"

    - rule: "统一响应格式"
      level: required
      format: |
        {
          "code": 200,
          "message": "success",
          "data": {}
        }

    - rule: "使用合适的 HTTP 状态码"
      level: required
      common:
        200: "成功"
        201: "创建成功"
        400: "请求参数错误"
        401: "未认证"
        403: "无权限"
        404: "资源不存在"
        500: "服务器内部错误"

    - rule: "API 版本管理"
      level: preferred
      method: "URL 路径前缀：/api/v1/"
