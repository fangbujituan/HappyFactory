# =============================================================================
# 代码风格本体 - 编码规范与风格清单
# =============================================================================
# level 说明:
#   required   - 必须遵循，代码审查不通过则打回
#   preferred  - 推荐遵循，提升代码可读性和一致性
#   optional   - 可选，视团队习惯决定
# =============================================================================

# ─────────────────────────────────────────────
# 命名规范
# ─────────────────────────────────────────────
naming:
  python:
    - target: "变量、函数、方法、模块、包"
      convention: "snake_case"
      level: required
      examples:
        good: ["user_name", "get_user_by_id", "config_manager.py"]
        bad: ["userName", "GetUserById", "ConfigManager.py"]

    - target: "类"
      convention: "PascalCase"
      level: required
      examples:
        good: ["UserService", "ApiClient", "ConfigManager"]
        bad: ["user_service", "api_client", "configManager"]

    - target: "常量"
      convention: "UPPER_SNAKE_CASE"
      level: required
      examples:
        good: ["MAX_RETRY_COUNT", "DEFAULT_TIMEOUT", "API_BASE_URL"]
        bad: ["maxRetryCount", "default_timeout"]

    - target: "私有属性/方法"
      convention: "单下划线前缀"
      level: preferred
      examples:
        good: ["_internal_cache", "_validate_input()"]
        bad: ["__internal_cache（双下划线仅用于 name mangling）"]

    - target: "布尔变量"
      convention: "is_/has_/can_/should_ 前缀"
      level: preferred
      examples:
        good: ["is_active", "has_permission", "can_edit"]
        bad: ["active", "permission", "edit_flag"]

  javascript_typescript:
    - target: "变量、函数"
      convention: "camelCase"
      level: required
      examples:
        good: ["userName", "getUserById"]

    - target: "类、接口、类型"
      convention: "PascalCase"
      level: required
      examples:
        good: ["UserService", "IUserRepository", "UserResponse"]

    - target: "常量"
      convention: "UPPER_SNAKE_CASE"
      level: required
      examples:
        good: ["MAX_RETRY_COUNT", "API_BASE_URL"]

    - target: "React 组件"
      convention: "PascalCase（文件名和组件名一致）"
      level: required
      examples:
        good: ["UserProfile.tsx", "LoginForm.tsx"]

  general:
    - rule: "名称必须有意义，禁止单字母变量（循环索引 i/j/k 除外）"
      level: required
      examples:
        bad: ["d = get_data()", "x = calculate(a, b)"]
        good: ["user_data = get_user_data()", "total_price = calculate_price(quantity, unit_price)"]

    - rule: "避免缩写，除非是广泛认知的缩写"
      level: preferred
      accepted_abbreviations: ["id", "url", "api", "db", "config", "auth", "admin", "info", "msg", "err", "req", "res", "ctx"]
      examples:
        bad: ["usr_mgr", "btn_clk_hdlr"]
        good: ["user_manager", "button_click_handler"]

    - rule: "函数名用动词开头，表达行为"
      level: preferred
      examples:
        good: ["get_user", "create_order", "validate_input", "send_email"]
        bad: ["user", "order_new", "input_valid"]

# ─────────────────────────────────────────────
# 文档与注释
# ─────────────────────────────────────────────
documentation:
  docstring:
    - rule: "所有公共函数、类、方法必须有 docstring"
      level: required
      format: "Google Style"
      example: |
        def get_user_by_id(user_id: int) -> Optional[User]:
            """根据用户 ID 查询用户信息。

            Args:
                user_id: 用户唯一标识。

            Returns:
                用户对象，不存在时返回 None。

            Raises:
                DatabaseError: 数据库查询异常。
            """

    - rule: "模块文件顶部必须有模块级 docstring"
      level: preferred
      note: "简要说明该模块的用途和职责"
      example: |
        """用户服务模块。

        提供用户注册、登录、信息查询等业务逻辑。
        """

    - rule: "私有函数的 docstring 可选，但复杂逻辑建议添加"
      level: optional

  comments:
    - rule: "注释解释 Why，不解释 What"
      level: required
      examples:
        bad: "# 将 count 加 1\ncount += 1"
        good: "# 重试次数加 1，超过阈值后触发告警\nretry_count += 1"

    - rule: "TODO 注释必须包含负责人和日期"
      level: preferred
      format: "# TODO(author, YYYY-MM-DD): 描述"
      example: "# TODO(zhangsan, 2025-04-01): 优化查询性能，当前全表扫描"

    - rule: "禁止注释掉的代码提交到仓库"
      level: required
      note: "用 Git 管理历史代码，不要用注释保留"

# ─────────────────────────────────────────────
# 类型注解
# ─────────────────────────────────────────────
type_hints:
  python:
    - rule: "所有公共函数必须有参数和返回值类型注解"
      level: required
      example: |
        def get_user(user_id: int) -> Optional[User]:
            ...

    - rule: "复杂类型使用 typing 模块"
      level: preferred
      examples:
        - "list[str]、dict[str, Any]、Optional[User]"
        - "Callable[[int, str], bool]"

    - rule: "私有函数的类型注解可选但推荐"
      level: preferred

  typescript:
    - rule: "禁止使用 any 类型（特殊场景需注释说明原因）"
      level: required

    - rule: "优先使用 interface 定义对象类型，type 用于联合类型和工具类型"
      level: preferred

# ─────────────────────────────────────────────
# 代码结构
# ─────────────────────────────────────────────
code_structure:
  function_rules:
    - rule: "单个函数不超过 50 行"
      level: preferred
      note: "超过 50 行说明职责过多，应拆分"

    - rule: "函数参数不超过 5 个"
      level: preferred
      note: "超过 5 个参数考虑封装为数据类或字典"

    - rule: "函数只做一件事（单一职责）"
      level: required

    - rule: "避免超过 3 层嵌套"
      level: preferred
      note: "用 early return、guard clause 减少嵌套"
      examples:
        bad: |
          if user:
              if user.is_active:
                  if user.has_permission:
                      do_something()
        good: |
          if not user:
              return
          if not user.is_active:
              return
          if not user.has_permission:
              return
          do_something()

  file_rules:
    - rule: "单个文件不超过 400 行"
      level: preferred
      note: "超过 400 行考虑拆分模块"

    - rule: "一个文件一个主要类（Python）"
      level: preferred
      note: "小的辅助类可以放在同一文件"

  import_rules:
    python:
      - rule: "导入顺序：标准库 → 第三方库 → 本地模块，各组之间空一行"
        level: required
        example: |
          import os
          import sys
          from typing import Optional

          import requests
          from flask import Flask

          from app.services.user_service import UserService
          from app.utils.logger import setup_logger

    javascript:
      - rule: "导入顺序：第三方库 → 绝对路径 → 相对路径，各组之间空一行"
        level: required

# ─────────────────────────────────────────────
# 格式化
# ─────────────────────────────────────────────
formatting:
  python:
    - rule: "遵循 PEP 8 规范"
      level: required
    - rule: "行宽限制 120 字符"
      level: preferred
      note: "现代显示器下 120 比 79 更实用"
    - rule: "使用 4 空格缩进"
      level: required
    - rule: "字符串优先使用双引号"
      level: preferred

  javascript_typescript:
    - rule: "使用 2 空格缩进"
      level: required
    - rule: "使用单引号（JSX 中用双引号）"
      level: preferred
    - rule: "语句末尾不加分号（配合 Prettier）"
      level: optional

# ─────────────────────────────────────────────
# 错误处理风格
# ─────────────────────────────────────────────
error_style:
  rules:
    - rule: "禁止空的 except/catch 块"
      level: required
      examples:
        bad: |
          try:
              do_something()
          except:
              pass
        good: |
          try:
              do_something()
          except SpecificError as e:
              logger.warning(f"操作失败: {e}")

    - rule: "捕获具体异常类型，禁止裸 except"
      level: required

    - rule: "异常信息必须包含上下文"
      level: preferred
      examples:
        bad: "raise ValueError('invalid input')"
        good: "raise ValueError(f'用户ID {user_id} 格式无效，期望正整数')"
