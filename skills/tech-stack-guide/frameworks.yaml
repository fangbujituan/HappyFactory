      note: "Java 生态绝对主力，Spring 6 基于 Jakarta EE"

    - name: Spring Cloud
      version: "2023.x / 2024.x"
      status: preferred
      scene: "微服务架构、分布式系统"
      note: "配合 Spring Boot，微服务全家桶"

    - name: Quarkus
      version: "3.x"
      status: accepted
      scene: "云原生 Java 应用、Serverless"
      note: "启动快内存低，GraalVM 原生编译支持"

    - name: Micronaut
      version: "4.x"
      status: accepted
      scene: "微服务、Serverless"
      note: "编译时 DI，启动快"

    - name: Vert.x
      version: "4.x"
      status: accepted
      scene: "高并发响应式应用"
      note: "事件驱动，非阻塞"

  web_frontend:
    - name: Vaadin
      version: "24.x"
      status: accepted
      scene: "Java 全栈 Web 应用"
      note: "纯 Java 写前端，适合后端团队"

    - name: Thymeleaf
      version: "3.x"
      status: accepted
      scene: "Spring Boot 服务端渲染"
      note: "Spring 官方推荐模板引擎"

  desktop:
    - name: JavaFX
      version: "21+"
      status: preferred
      scene: "跨平台桌面应用"
      note: "Java 桌面开发现代方案"

    - name: Jetpack Compose Desktop
      version: "1.x"
      status: accepted
      scene: "Kotlin 跨平台桌面应用"
      note: "JetBrains 出品，声明式 UI"

  mobile:
    - name: Jetpack Compose
      version: "1.x"
      status: preferred
      scene: "Android 原生开发"
      note: "Google 官方推荐，声明式 UI"

    - name: Kotlin Multiplatform
      version: "1.9+"
      status: accepted
      scene: "Kotlin 跨平台(Android/iOS/Desktop/Web)"
      note: "共享业务逻辑，原生 UI"


