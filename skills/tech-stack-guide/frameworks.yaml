# =============================================================================
# 技术选型指南 - 主流框架清单
# =============================================================================
# status 说明:
#   preferred  - 首选推荐，团队主力技术栈
#   accepted   - 可接受，适合特定场景
#   excluded   - 排除，不允许在项目中使用
#
# 修改 status 字段即可控制 AI 自动编码时的选型范围
# =============================================================================

# ─────────────────────────────────────────────
# JavaScript / TypeScript
# ─────────────────────────────────────────────
javascript:
  web_frontend:
    - name: React
      version: "18.x / 19.x"
      status: preferred
      scene: "中大型 SPA、后台管理系统、跨平台(React Native)"
      note: "生态最成熟，社区资源丰富"

    - name: Vue
      version: "3.x"
      status: preferred
      scene: "中小型项目、后台管理、快速原型"
      note: "上手快，中文生态好，配合 Vite 开发体验优秀"

    - name: Next.js
      version: "14.x / 15.x"
      status: preferred
      scene: "SSR/SSG 站点、全栈 Web 应用"
      note: "React 生态首选全栈框架，App Router 已稳定"

    - name: Nuxt
      version: "3.x"
      status: accepted
      scene: "Vue 生态 SSR/SSG 应用"
      note: "Vue 全栈方案首选"

    - name: Svelte / SvelteKit
      version: "5.x"
      status: accepted
      scene: "轻量 Web 应用、注重性能的场景"
      note: "编译时框架，bundle 体积小"

    - name: Angular
      version: "17.x / 18.x"
      status: accepted
      scene: "大型企业级应用、强类型要求高的团队"
      note: "全家桶方案，学习曲线较陡"

    - name: Astro
      version: "4.x"
      status: accepted
      scene: "内容驱动型网站、文档站、博客"
      note: "Islands 架构，默认零 JS"

    - name: Solid.js
      version: "1.x"
      status: accepted
      scene: "高性能 Web 应用"
      note: "细粒度响应式，无虚拟 DOM"

  web_backend:
    - name: Express
      version: "4.x / 5.x"
      status: preferred
      scene: "REST API、微服务、BFF 层"
      note: "Node.js 最经典后端框架，中间件生态丰富"

    - name: Nest.js
      version: "10.x"
      status: preferred
      scene: "企业级后端、微服务架构"
      note: "TypeScript 优先，装饰器风格，类 Spring 架构"

    - name: Fastify
      version: "4.x"
      status: accepted
      scene: "高性能 API 服务"
      note: "比 Express 更快，schema 验证内置"

    - name: Hono
      version: "4.x"
      status: accepted
      scene: "Edge 运行时、Serverless、轻量 API"
      note: "超轻量，支持多运行时(Cloudflare Workers/Deno/Bun)"

    - name: Koa
      version: "2.x"
      status: accepted
      scene: "轻量 API 服务"
      note: "Express 团队出品，更现代的中间件模型"

  desktop:
    - name: Electron
      version: "30.x+"
      status: preferred
      scene: "跨平台桌面应用"
      note: "生态最成熟(VS Code/Slack 等)，内存占用较高"

    - name: Tauri
      version: "2.x"
      status: preferred
      scene: "轻量跨平台桌面应用"
      note: "Rust 后端 + Web 前端，体积小性能好"

    - name: Wails
      version: "2.x"
      status: accepted
      scene: "Go + Web 前端桌面应用"
      note: "类 Tauri 方案，Go 生态"

  mobile:
    - name: React Native
      version: "0.74+"
      status: preferred
      scene: "跨平台移动应用"
      note: "New Architecture 已稳定，配合 Expo 开发效率高"

    - name: Expo
      version: "51+"
      status: preferred
      scene: "React Native 项目的首选工具链"
      note: "简化 RN 开发流程，EAS 构建服务"

  css_ui:
    - name: Tailwind CSS
      version: "3.x / 4.x"
      status: preferred
      scene: "所有 Web 项目"
      note: "原子化 CSS，开发效率高"

    - name: Ant Design
      version: "5.x"
      status: preferred
      scene: "React 后台管理系统"
      note: "企业级组件库，中文文档完善"

    - name: Element Plus
      version: "2.x"
      status: preferred
      scene: "Vue 3 后台管理系统"
      note: "Vue 生态最流行的组件库"

    - name: shadcn/ui
      version: "latest"
      status: preferred
      scene: "React 项目，需要高度自定义的 UI"
      note: "非传统组件库，代码复制到项目中，完全可控"

  build_tools:
    - name: Vite
      version: "5.x / 6.x"
      status: preferred
      scene: "前端项目构建"
      note: "当前前端构建工具首选"

    - name: Webpack
      version: "5.x"
      status: accepted
      scene: "存量项目维护"
      note: "功能全面但配置复杂，新项目建议用 Vite"

    - name: Turbopack
      version: "latest"
      status: accepted
      scene: "Next.js 项目"
      note: "Vercel 出品，Next.js 内置支持"


# ─────────────────────────────────────────────
# Python
# ─────────────────────────────────────────────
python:
  web_backend:
    - name: FastAPI
      version: "0.110+"
      status: preferred
      scene: "REST/GraphQL API、微服务、AI 应用后端"
      note: "异步优先，自动生成 OpenAPI 文档，类型提示驱动"

    - name: Django
      version: "5.x"
      status: preferred
      scene: "全栈 Web 应用、CMS、后台管理"
      note: "全家桶方案，ORM/Admin/Auth 内置，适合快速交付"

    - name: Flask
      version: "3.x"
      status: accepted
      scene: "轻量 API、微服务、原型验证"
      note: "灵活轻量，扩展丰富"

    - name: Django REST Framework
      version: "3.15+"
      status: preferred
      scene: "Django 项目的 REST API"
      note: "Django 生态 API 开发标配"

    - name: Sanic
      version: "23.x"
      status: accepted
      scene: "高性能异步 API"
      note: "类 Flask 语法，原生异步"

  web_frontend:
    - name: Streamlit
      version: "1.x"
      status: accepted
      scene: "数据可视化、AI Demo、内部工具"
      note: "纯 Python 写前端，适合数据团队"

    - name: Gradio
      version: "4.x"
      status: accepted
      scene: "AI/ML 模型 Demo 界面"
      note: "快速搭建 AI 应用界面"

  desktop:
    - name: PyQt / PySide
      version: "6.x"
      status: preferred
      scene: "跨平台桌面应用"
      note: "Qt 绑定，功能全面，商业项目注意 License"

    - name: Tkinter
      version: "内置"
      status: accepted
      scene: "简单桌面工具"
      note: "Python 内置，适合小工具"

    - name: Flet
      version: "0.x"
      status: accepted
      scene: "快速桌面/Web/移动应用"
      note: "基于 Flutter，纯 Python 开发"

  testing:
    - name: pytest
      version: "8.x"
      status: preferred
      scene: "所有 Python 测试"
      note: "Python 测试框架事实标准"

    - name: Locust
      version: "2.x"
      status: preferred
      scene: "性能测试、负载测试"
      note: "Python 编写测试脚本，分布式支持"

    - name: Selenium
      version: "4.x"
      status: accepted
      scene: "浏览器自动化测试"
      note: "经典 UI 自动化方案"

    - name: Playwright
      version: "1.x"
      status: preferred
      scene: "浏览器自动化测试、E2E 测试"
      note: "微软出品，比 Selenium 更现代，自动等待机制"

# ─────────────────────────────────────────────
# Java / Kotlin
# ─────────────────────────────────────────────
java:
  web_backend:
    - name: Spring Boot
      version: "3.x"
      status: preferred
