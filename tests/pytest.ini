[pytest]
markers =
    api: API 接口测试
    ui: UI 自动化测试
    perf: 性能测试
    security: 安全测试
addopts = -v --tb=short --html=tests/reports/report.html --self-contained-html --junitxml=tests/reports/junit.xml
testpaths = tests/testcases
# Allure 报告（可选，需安装 allure-pytest）:
#   pytest --alluredir=tests/reports/allure-results
